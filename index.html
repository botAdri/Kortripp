<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국 · Guide de Voyage — Automne</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#B84A22">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="한국 Voyage">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+KR:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --cream:        #F6F2EC;
  --warm:         #FDFAF6;
  --ink:          #1A130E;
  --ink-light:    #4A3728;
  --terra:        #C4562A;
  --terra-soft:   #E8845A;
  --gold:         #C9913A;
  --gold-light:   #E8C57A;
  --sage:         #5C7A5E;
  --sage-light:   #9DB89F;
  --border:       rgba(196,86,42,0.13);
  --shadow-sm:    0 2px 12px rgba(26,19,14,0.07);
  --shadow-md:    0 4px 28px rgba(26,19,14,0.11);
  --shadow-lg:    0 8px 48px rgba(26,19,14,0.15);

  /* couleur par étape */
  --c1: #1E3A5F;
  --c2: #B84A22;
  --c3: #2D6B3A;
  --c4: #7A4F2A;
  --c5: #8B3A6A;
  --c6: #4A7FA5;
  --c7: #3D6B8A;
  --c8: #1F5C7A;

  /* accent dynamique selon la saison (défaut : automne) */
  --season-a: var(--terra);
  --season-b: var(--gold);
  --season-c: var(--sage);
}

:root[data-season="printemps"] {
  --season-a: #C6748F;
  --season-b: #8FA6C9;
  --season-c: #8FBFA0;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow: hidden;
}

/* ═══ LAYOUT ═══ */
.app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
  overflow: hidden;
}

.header {
  background: var(--warm);
  border-bottom: 2px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  position: relative;
  z-index: 100;
}
.header::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:3px;
  background: linear-gradient(90deg, var(--season-a), var(--season-b), var(--season-c));
  transition: background .3s ease;
}
.header-korean {
  font-family:'Noto Serif KR',serif;
  font-size:10px;
  letter-spacing:.25em;
  color:var(--gold);
  display:block;
  margin-bottom:2px;
}
.header-title {
  font-family:'Playfair Display',serif;
  font-size: clamp(16px,2.5vw,22px);
  font-weight:700;
  color:var(--ink);
  line-height:1.2;
}
.header-title span { color:var(--season-a); transition: color .3s ease; }
.header-sub {
  font-size:11px;
  color:#888;
  white-space:nowrap;
}
.header-right {
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

/* ═══ SÉLECTEUR DE SAISON ═══ */
.season-toggle {
  position: relative;
  display: inline-flex;
  align-items: center;
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: 999px;
  padding: 3px;
  gap: 2px;
}
.season-toggle-pill {
  position: absolute;
  top: 3px;
  left: 3px;
  height: calc(100% - 6px);
  width: calc(50% - 3px);
  border-radius: 999px;
  background: linear-gradient(120deg, var(--terra), var(--gold));
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  z-index: 0;
}
.season-toggle[data-season="printemps"] .season-toggle-pill {
  transform: translateX(100%);
  background: linear-gradient(120deg, #C6748F, #8FA6C9);
}
.season-btn {
  position: relative;
  z-index: 1;
  border: none;
  background: transparent;
  padding: 6px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-light);
  cursor: pointer;
  border-radius: 999px;
  transition: color .2s;
  white-space: nowrap;
}
.season-toggle[data-season="automne"] .season-btn[data-value="automne"],
.season-toggle[data-season="printemps"] .season-btn[data-value="printemps"] {
  color: white;
}
@media (max-width: 720px) {
  .season-btn { padding: 6px 10px; font-size: 11px; }
}
.back-btn {
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:6px 14px;
  border-radius:999px;
  border:1.5px solid var(--border);
  background:transparent;
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  color:var(--ink-light);
  cursor:pointer;
  text-decoration:none;
  transition:all .18s;
}
.back-btn:hover { background:var(--terra); border-color:var(--terra); color:white; }
.stat-pill {
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:5px 11px;
  border-radius:999px;
  background:var(--cream);
  border:1px solid var(--border);
  font-size:11px;
  color:var(--ink-light);
  font-weight:500;
}

/* ═══ BODY SPLIT ═══ */
.body {
  display: grid;
  grid-template-columns: 340px 1fr;
  overflow: hidden;
  height: 100%;
}

/* ═══ SIDEBAR ═══ */
.sidebar {
  display: flex;
  flex-direction: column;
  background: var(--warm);
  border-right: 1.5px solid var(--border);
  overflow: hidden;
}

/* City tabs */
.city-tabs {
  display: flex;
  overflow-x: auto;
  border-bottom: 1.5px solid var(--border);
  background: var(--cream);
  scrollbar-width: none;
  flex-shrink: 0;
}
.city-tabs::-webkit-scrollbar { display:none; }
.city-tab {
  flex-shrink: 0;
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  border: none;
  background: transparent;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  color: #999;
  transition: all .18s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
.city-tab:hover { color: var(--ink); }
.city-tab.active {
  color: var(--ink);
  border-bottom-color: currentColor;
}
.city-tab .tab-num {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: currentColor;
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  font-weight: 700;
  flex-shrink: 0;
}
.city-tab .tab-num span { color: white; }

/* Activities panel */
.activities-panel {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.city-panel { display: none; }
.city-panel.active { display: block; }

.city-header {
  padding: 16px 18px 12px;
  color: white;
  position: relative;
  overflow: hidden;
}
.city-header::after {
  content: attr(data-korean);
  position: absolute;
  right: -8px; top: -8px;
  font-family: 'Noto Serif KR', serif;
  font-size: 56px;
  font-weight: 600;
  opacity: .1;
  line-height: 1;
  pointer-events: none;
}
.city-badge {
  display: inline-block;
  font-size: 9px;
  letter-spacing: .15em;
  text-transform: uppercase;
  background: rgba(255,255,255,.22);
  border-radius: 999px;
  padding: 2px 8px;
  margin-bottom: 5px;
}
.city-name {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  line-height: 1.1;
}
.city-dates {
  font-size: 11px;
  opacity: .8;
  margin-top: 4px;
}
.city-desc {
  padding: 12px 18px;
  font-size: 12px;
  color: var(--ink-light);
  line-height: 1.65;
  border-bottom: 1px solid var(--border);
  background: var(--cream);
}

/* Activity items */
.activities-list {
  padding: 10px 14px 20px;
}
.activity-card {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(0,0,0,.05);
  cursor: default;
  transition: background .15s;
  border-radius: 8px;
}
.activity-card:last-child { border-bottom: none; }
.activity-card:hover { background: var(--cream); padding-left:6px; padding-right:6px; margin:0 -6px; }
.activity-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--cream);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.activity-body { flex: 1; min-width: 0; }
.activity-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 3px;
}
.activity-sub {
  font-size: 11px;
  color: #888;
  line-height: 1.45;
}
.activity-tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 999px;
  font-size: 9px;
  font-weight: 600;
  margin-top: 4px;
  letter-spacing: .04em;
}
.tag-free { background: #EEF7EE; color: #3D6B3A; border: 1px solid #C4E0C4; }
.tag-paid { background: #FDF4EE; color: #8B4A1E; border: 1px solid #E8C4AA; }
.tag-must { background: #FEF9EE; color: #8B6A1E; border: 1px solid #E8D8AA; }

/* Budget bar */
.budget-bar {
  margin: 0 14px 14px;
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
}
.budget-bar-title {
  font-size: 9px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--terra);
  font-weight: 700;
  margin-bottom: 8px;
}
.budget-items {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.budget-item {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.budget-item-label {
  font-size: 9px;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.budget-item-value {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
}
.budget-total {
  font-size: 14px;
  color: var(--terra);
}

/* ═══ BUDGET GLOBAL ═══ */
.budget-global-header {
  padding: 16px 18px 12px;
  color: white;
  position: relative;
  overflow: hidden;
  background: linear-gradient(120deg, var(--season-a), var(--season-b));
  transition: background .3s ease;
}
.budget-global-header::after {
  content: '✈️';
  position: absolute;
  right: 4px; top: -10px;
  font-size: 56px;
  opacity: .18;
  line-height: 1;
  pointer-events: none;
}
.budget-global-desc {
  padding: 12px 18px;
  font-size: 12px;
  color: var(--ink-light);
  line-height: 1.65;
  border-bottom: 1px solid var(--border);
  background: var(--cream);
}
.budget-global-section {
  padding: 14px 18px 4px;
}
.budget-section-title {
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--terra);
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.budget-card {
  background: var(--warm);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 12px;
}
.budget-card-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
  padding: 4px 0;
  flex-wrap: wrap;
}
.budget-card-row > div:first-child {
  flex: 1 1 auto;
  min-width: 140px;
}
.budget-card-row + .budget-card-row {
  border-top: 1px dashed var(--border);
  margin-top: 4px;
  padding-top: 8px;
}
.budget-card-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
}
.budget-card-sub {
  font-size: 10.5px;
  color: #999;
  line-height: 1.5;
  margin-top: 2px;
}
.budget-price-edit {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.price-input, .flight-price-input {
  width: 56px;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 5px;
  border: 1.5px solid var(--terra);
  border-radius: 6px;
  text-align: right;
}
.flight-price-input {
  width: 96px;
}
.price-edit-btn, .flight-price-edit-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 12px;
  padding: 2px 4px;
  opacity: .55;
  line-height: 1;
}
.price-edit-btn:hover, .flight-price-edit-btn:hover {
  opacity: 1;
}
.budget-reset-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--terra);
  background: none;
  border: 1.5px solid var(--terra);
  border-radius: 20px;
  padding: 5px 12px;
  cursor: pointer;
  margin-bottom: 10px;
}
.budget-reset-btn:active {
  transform: scale(0.97);
}
.budget-card-amount {
  font-size: 14px;
  font-weight: 700;
  color: var(--terra);
  white-space: nowrap;
}
.flight-price-display {
  white-space: normal;
  max-width: 140px;
  text-align: right;
}
.budget-grand-total {
  margin: 6px 18px 22px;
  background: var(--ink);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--warm);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-md);
}
.budget-grand-total-label {
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  opacity: .75;
}
.budget-grand-total-sub {
  font-size: 10.5px;
  opacity: .55;
  margin-top: 2px;
}
.budget-grand-total-amount {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--gold-light);
  white-space: nowrap;
}
.budget-note {
  font-size: 10.5px;
  color: #aaa;
  line-height: 1.6;
  padding: 0 18px 18px;
  font-style: italic;
}
.budget-links {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.budget-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 13px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--ink);
  font-size: 11px;
  font-weight: 600;
  text-decoration: none;
  transition: all .15s;
}
.budget-link:hover {
  border-color: var(--terra);
  color: var(--terra);
  background: var(--cream);
}

/* ═══ ENCART BUDGET (bouton flottant + modale) ═══ */
.budget-fab {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 800;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 16px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(120deg, var(--season-a), var(--season-b));
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .02em;
  cursor: pointer;
  box-shadow: var(--shadow-md);
  transition: transform .18s, box-shadow .18s, background .3s ease;
}
.budget-fab:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

.budget-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,19,14,.55);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.budget-overlay.active { display: flex; }

.budget-modal {
  background: var(--warm);
  width: 100%;
  max-width: 440px;
  max-height: 86vh;
  overflow-y: auto;
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.budget-modal-close {
  position: absolute;
  top: 10px; right: 10px;
  width: 30px; height: 30px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,.25);
  color: white;
  font-size: 18px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1;
  transition: background .15s;
}
.budget-modal-close:hover { background: rgba(255,255,255,.4); }

@media (max-width: 720px) {
  .budget-fab { top: 10px; right: 10px; padding: 7px 12px; font-size: 11px; }
}

/* ═══ MAP ═══ */
.map-wrap {
  position: relative;
  width: 100%;
  height: 100%;
}
#map { width:100%; height:100%; }

/* Map legend */
.map-legend {
  position: absolute;
  bottom: 14px; left: 14px;
  background: rgba(253,250,246,.95);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 13px;
  font-size: 11px;
  z-index: 500;
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(8px);
}
.map-legend-title {
  font-size: 9px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--terra);
  font-weight: 700;
  margin-bottom: 6px;
}
.legend-row {
  display: flex; align-items: center; gap: 7px;
  padding: 2px 0;
  color: var(--ink-light);
  font-size: 11px;
}
.legend-dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ═══ PINS ═══ */
.map-pin {
  position: relative;
  width: 36px; height: 44px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,.28));
  cursor: pointer;
  transition: transform .15s ease, filter .15s ease;
}
.map-pin:hover, .map-pin.active {
  transform: translateY(-3px) scale(1.12);
  filter: drop-shadow(0 6px 12px rgba(0,0,0,.38));
}
.map-pin-body {
  width: 36px; height: 36px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2.5px solid rgba(255,255,255,.88);
  position: relative;
}
.map-pin-body::after {
  content:'';
  position:absolute;
  inset:4px;
  border-radius:50%;
  background:rgba(255,255,255,.18);
}
.map-pin-number {
  transform: rotate(45deg);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: white;
  position: relative;
  z-index: 1;
  text-shadow: 0 1px 2px rgba(0,0,0,.25);
}

/* ═══ MOBILE ═══ */
@media (max-width: 720px) {
  html, body { overflow: auto; }
  .app { grid-template-rows: auto auto auto; height: auto; overflow: visible; }
  .body { grid-template-columns: 1fr; grid-template-rows: 50vh auto; }
  .sidebar { border-right: none; border-top: 1.5px solid var(--border); max-height: 70vh; overflow: auto; }
  .map-wrap { height: 50vh; }
  .body { overflow: visible; height: auto; }
  .header { gap:10px; }
  .header-right { display:none; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ═══ HEADER ═══ -->
  <header class="header">
    <div>
      <span class="header-korean">한국 로드트립 · 활동 가이드</span>
      <h1 class="header-title">Guide de <span>Voyage</span></h1>
    </div>
    <span class="header-sub" id="headerSub">🍂 Dates à définir · Route de l'Ouest · 8 étapes</span>

    <div class="season-toggle" id="seasonToggle" data-season="automne">
      <div class="season-toggle-pill"></div>
      <button class="season-btn" data-value="automne">🍂 Automne</button>
      <button class="season-btn" data-value="printemps">🌸 Printemps</button>
    </div>

    <div class="header-right">
      <span class="stat-pill">🗺️ 8 villes</span>
      <span class="stat-pill">🎯 28 activités</span>
      <span class="stat-pill">📅 14 jours</span>
    </div>
  </header>

  <!-- ═══ BODY ═══ -->
  <div class="body">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- City tabs -->

// Le contenu (activités, dates, budget) reste celui de l'automne pour les deux saisons ;

const SEASON_META = {
  automne: {
    emoji: "🍂",
    label: "Automne",
    headerSub: "🍂 Dates à définir · Route de l'Ouest · 8 étapes",
    titleSuffix: "Automne",

  printemps: {

    label: "Printemps",
    headerSub: "🌸 Dates à définir · Route Sud-Est · 8 étapes",
    titleSuffix: "Printemps",
  },
};

let currentSeason = localStorage.getItem('kortripp-season') || 'automne';

function applySeason(season, { persist = true } = {}) {
  if (!SEASON_META[season]) return;
  currentSeason = season;
  const meta = SEASON_META[season];

  // Attribut sur la racine du document : pilote les variables CSS d'accent
  // (bouton budget, en-tête de la modale, liseré du header)
  document.documentElement.setAttribute('data-season', season);

  // Toggle visuel (position du curseur + labels actifs)
  const toggleEl = document.getElementById('seasonToggle');
  if (toggleEl) toggleEl.setAttribute('data-season', season);

  // Sous-titre du header
  const headerSubEl = document.getElementById('headerSub');
  if (headerSubEl) headerSubEl.textContent = meta.headerSub;

  // Titre de l'onglet navigateur
  document.title = `한국 · Guide de Voyage — ${meta.titleSuffix}`;

  // Reconstruire l'itinéraire (tabs, panneaux, marqueurs, tracé, légende)
  // avec les données propres à la saison sélectionnée — inclut la mise à jour des badges
  buildItinerary(SEASON_STOPS[season]);

  // Reconstruire l'encart budget global avec les tarifs propres à la saison
  if (typeof renderBudgetModal === 'function') renderBudgetModal(season);

  if (persist) {
    try { localStorage.setItem('kortripp-season', season); } catch (e) { /* ignore */ }
  }

  // Événement personnalisé — permet d'étendre le comportement au changement de saison
  document.dispatchEvent(new CustomEvent('seasonchange', { detail: { season } }));
}

document.getElementById('seasonToggle')?.querySelectorAll('.season-btn').forEach((btn) => {
  btn.addEventListener('click', () => applySeason(btn.dataset.value));
});

function getTagHTML(tag, price) {
  if (tag === 'free') return `<span class="activity-tag tag-free">✓ ${price}</span>`;
  if (tag === 'must') return `<span class="activity-tag tag-must">⭐ Incontournable · ${price}</span>`;

// Construit (ou reconstruit) tabs, panneaux, marqueurs, tracé et légende
// à partir des données de la saison active.
function buildItinerary(stopsData) {
  stops = stopsData;

  // ─ Nettoyage de l'existant (tabs, panneaux, marqueurs, tracé) ─
  tabsEl.innerHTML = '';
  panelEl.innerHTML = '';
  mapMarkers.forEach((m) => map.removeLayer(m));
  mapMarkers = [];
  if (routeLine) map.removeLayer(routeLine);

  // ─ Tracé de la route ─
  const routeCoords = stops.map(s => [s.lat, s.lng]);
  routeLine = L.polyline(routeCoords, {
    color: '#C4562A',
    weight: 2.5,
    opacity: 0.55,
    dashArray: '8, 6'
  }).addTo(map);

  // ─ Légende ─
  const meta = SEASON_META[currentSeason];
  if (legendTitleEl) legendTitleEl.textContent = `${meta.emoji} Étapes ${meta.label.toLowerCase()}`;
  if (legendRowsEl) {
    legendRowsEl.innerHTML = stops.map((s) =>
      `<div class="legend-row"><div class="legend-dot" style="background:${s.color}"></div> ${s.name}</div>`
    ).join('');
  }

  stops.forEach((stop, i) => {
    // ─ Tab ─
    const tab = document.createElement('button');
    tab.className = 'city-tab' + (i === 0 ? ' active' : '');
    tab.style.color = stop.color;
    tab.style.borderBottomColor = i === 0 ? stop.color : 'transparent';
    tab.innerHTML = `<span class="tab-num" style="background:${stop.color}"><span>${stop.id}</span></span>${stop.name}`;
    tab.addEventListener('click', () => selectStop(i));
    tabsEl.appendChild(tab);

    // ─ Panel ─
    const acts = stop.activites.map(a => `
      <div class="activity-card">
        <div class="activity-icon">${a.icon}</div>
        <div class="activity-body">
          <div class="activity-name">${a.name}</div>
          <div class="activity-sub">${a.desc}</div>
          ${getTagHTML(a.tag, a.price)}
        </div>
      </div>`).join('');

    const panel = document.createElement('div');
    panel.className = 'city-panel' + (i === 0 ? ' active' : '');
    panel.id = `panel-${i}`;
    panel.innerHTML = `
      <div class="city-header" style="background:${stop.color}" data-korean="${stop.korean}">
        <div class="city-badge">Étape ${stop.id} · <span class="season-badge-text">${meta.emoji} ${meta.label}</span></div>
        <div class="city-name">${stop.name}</div>
        <div class="city-dates">📅 ${stop.dates}</div>
      </div>
      <div class="city-desc">${stop.desc}</div>
      <div class="activities-list">${acts}</div>
      <div class="budget-bar">
        <div class="budget-bar-title">💰 Budget étape — 1 personne</div>
        <div class="budget-items">
          <div class="budget-item"><span class="budget-item-label">Hébergement</span><span class="budget-item-value">${stop.budget.heberg}</span></div>
          <div class="budget-item"><span class="budget-item-label">Restauration</span><span class="budget-item-value">${stop.budget.repas}</span></div>
          <div class="budget-item"><span class="budget-item-label">Activités</span><span class="budget-item-value">${stop.budget.activites}</span></div>
          <div class="budget-item"><span class="budget-item-label">Total étape</span><span class="budget-item-value budget-total">${stop.budget.total}</span></div>
        </div>
      </div>`;
    panelEl.appendChild(panel);

    // ─ Map marker ─
    const color = stop.color;
    const icon = L.divIcon({
      html: `<div class="map-pin" id="pin-${i}">
               <div class="map-pin-body" style="background:${color}">
                 <span class="map-pin-number">${stop.id}</span>
               </div>
             </div>`,
      iconSize: [36, 44],
      iconAnchor: [18, 44],
      popupAnchor: [0, -46],
      className: ''
    });

    const marker = L.marker([stop.lat, stop.lng], { icon }).addTo(map);
    marker.on('click', () => selectStop(i));
    mapMarkers.push(marker);
  });

  // Recadrer la carte sur les nouveaux points et revenir à la 1ère étape
  map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
  activeIdx = 0;
}

function parseRangeNumbers(str) {
  const matches = (String(str).match(/\d+(?:[.,]\d+)?/g) || []).map(n => parseFloat(n.replace(',', '.')));
  if (matches.length === 0) return [0, 0];
  if (matches.length === 1) return [matches[0], matches[0]];
  return [Math.min(matches[0], matches[1]), Math.max(matches[0], matches[1])];
}

function formatEuro(n) {
  return Math.round(n).toLocaleString('fr-FR');
}

function computeGrandTotal(season) {
  const b = BUDGET_DATA[season];
  const flightOverrides = getFlightOverrides(season);
  const flightStr = flightOverrides['direct'] !== undefined ? flightOverrides['direct'] : b.flights.direct;
  const [flightMin, flightMax] = parseRangeNumbers(flightStr);
  const accomStats = computeAccomStats(season);
  const [carMin, carMax] = parseRangeNumbers(b.car.totalForSplit);
  const repas = b.repasActivitesTotal;
  const min = flightMin + accomStats.total + (carMin / 2) + repas;
  const max = flightMax + accomStats.total + (carMax / 2) + repas;
  return { min: Math.round(Math.min(min, max)), max: Math.round(Math.max(min, max)) };
}

function refreshGrandTotal(season) {
  const el = document.getElementById('grand-total-amount');
  if (!el) return;
  const { min, max } = computeGrandTotal(season);
  el.textContent = `~${formatEuro(min)} – ${formatEuro(max)} €`;
}

function getFlightOverrides(season) {
  try {
    const raw = localStorage.getItem(`kortripp-flight-overrides-${season}`);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function setFlightOverride(season, key, value) {
  const overrides = getFlightOverrides(season);
  overrides[key] = value;
  localStorage.setItem(`kortripp-flight-overrides-${season}`, JSON.stringify(overrides));
}

function resetFlightOverrides(season) {
  localStorage.removeItem(`kortripp-flight-overrides-${season}`);
}

function renderFlightRow(season, key, label, sub, defaultValue) {
  const overrides = getFlightOverrides(season);
  const value = overrides[key] !== undefined ? overrides[key] : defaultValue;
  return `
      <div class="budget-card-row">
        <div>
          <div class="budget-card-label">${label}</div>
          <div class="budget-card-sub">${sub}</div>
        </div>
        <div class="budget-price-edit">
          <span class="budget-card-amount flight-price-display" data-flight-key="${key}">${value}</span>
          <input type="text" class="flight-price-input" data-flight-key="${key}" value="${value}" style="display:none;" />
          <button class="flight-price-edit-btn" aria-label="Modifier le tarif" data-flight-key="${key}">✏️</button>
        </div>
      </div>`;
}

function handleFlightEditClick(e) {
  const btn = e.target.closest('.flight-price-edit-btn');
  if (!btn) return;
  const row = btn.closest('.budget-card-row');
  const display = row.querySelector('.flight-price-display');
  const input = row.querySelector('.flight-price-input');
  if (input.style.display === 'none') {
    display.style.display = 'none';
    input.style.display = 'inline-block';
    input.focus();
    input.select();
  } else {
    saveFlightEdit(btn.dataset.flightKey, row);
  }
}

function saveFlightEdit(key, row) {
  const display = row.querySelector('.flight-price-display');
  const input = row.querySelector('.flight-price-input');
  const value = input.value.trim() || display.textContent;
  setFlightOverride(currentSeason, key, value);
  display.textContent = value;
  display.style.display = 'inline';
  input.style.display = 'none';
  refreshGrandTotal(currentSeason);
}


function getPriceOverrides(season) {
  try {
    const raw = localStorage.getItem(`kortripp-price-overrides-${season}`);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function setPriceOverride(season, cityName, value) {
  const overrides = getPriceOverrides(season);
  overrides[cityName] = value;
  localStorage.setItem(`kortripp-price-overrides-${season}`, JSON.stringify(overrides));
}

function resetPriceOverrides(season) {
  localStorage.removeItem(`kortripp-price-overrides-${season}`);
}

function parseNights(nightsStr) {
  const m = nightsStr.match(/\d+/);
  return m ? parseInt(m[0], 10) : 1;
}

function parsePrice(priceStr) {
  const m = priceStr.match(/[\d.]+/);
  return m ? parseFloat(m[0]) : 0;
}

function computeAccomStats(season) {
  const b = BUDGET_DATA[season];
  const overrides = getPriceOverrides(season);
  let total = 0, totalNights = 0;
  b.accomCities.forEach((c) => {
    const nights = parseNights(c.nights);
    const price = overrides[c.name] !== undefined ? overrides[c.name] : parsePrice(c.price);
    total += nights * price;
    totalNights += nights;
  });
  return {
    total: Math.round(total),
    avg: totalNights ? Math.round(total / totalNights) : 0,
  };
}

function renderAccomCityRows(cities, season) {
  const overrides = getPriceOverrides(season);
  return cities.map((c) => {
    const price = overrides[c.name] !== undefined ? overrides[c.name] : parsePrice(c.price);
    return `
      <div class="budget-card-row">
        <div>
          <div class="budget-card-label">🛏️ ${c.name} — ${c.nights}</div>
          <div class="budget-card-sub">${c.sub}</div>
        </div>
        <div class="budget-price-edit">
          <span class="budget-card-amount price-display" data-city="${c.name}">${Math.round(price)} €/nuit</span>
          <input type="number" class="price-input" data-city="${c.name}" value="${Math.round(price)}" style="display:none;" min="0" step="1" />
          <button class="price-edit-btn" aria-label="Modifier le prix de ${c.name}" data-city="${c.name}">✏️</button>
        </div>
      </div>`;
  }).join('');
}

function handlePriceEditClick(e) {
  const btn = e.target.closest('.price-edit-btn');
  if (!btn) return;
  const city = btn.dataset.city;
  const row = btn.closest('.budget-card-row');
  const display = row.querySelector('.price-display');
  const input = row.querySelector('.price-input');
  if (input.style.display === 'none') {
    display.style.display = 'none';
    input.style.display = 'inline-block';
    input.focus();
    input.select();
  } else {
    savePriceEdit(city, row);
  }
}

function savePriceEdit(city, row) {
  const display = row.querySelector('.price-display');
  const input = row.querySelector('.price-input');
  const value = Math.max(0, parseFloat(input.value) || 0);
  setPriceOverride(currentSeason, city, value);
  display.textContent = `${Math.round(value)} €/nuit`;
  display.style.display = 'inline';
  input.style.display = 'none';
  refreshAccomTotals(currentSeason);
  refreshGrandTotal(currentSeason);
}

function refreshAccomTotals(season) {
  const stats = computeAccomStats(season);
  const totalEl = document.getElementById('accom-total-amount');
  const avgEl = document.getElementById('accom-avg-amount');
  if (totalEl) totalEl.textContent = `~${stats.total} €`;
  if (avgEl) avgEl.textContent = `~${stats.avg} €/nuit`;
}

document.getElementById('budgetModalBody').addEventListener('click', (e) => {
  if (e.target.closest('#resetPricesBtn')) {
    resetPriceOverrides(currentSeason);
    renderBudgetModal(currentSeason);
    return;
  }
  if (e.target.closest('#resetFlightsBtn')) {
    resetFlightOverrides(currentSeason);
    renderBudgetModal(currentSeason);
    return;
  }
  handlePriceEditClick(e);
  handleFlightEditClick(e);
});
document.getElementById('budgetModalBody').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target.classList.contains('price-input')) {
    e.preventDefault();
    const row = e.target.closest('.budget-card-row');
    const city = e.target.dataset.city;
    savePriceEdit(city, row);
  }
  if (e.key === 'Enter' && e.target.classList.contains('flight-price-input')) {
    e.preventDefault();
    const row = e.target.closest('.budget-card-row');
    saveFlightEdit(e.target.dataset.flightKey, row);
  }
});

// ═══ SELECT STOP ═══
function selectStop(idx) {
  // Update tabs
  document.querySelectorAll('.city-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
    t.style.borderBottomColor = i === idx ? stops[i].color : 'transparent';
  });

  // Update panels
  document.querySelectorAll('.city-panel').forEach((p, i) => {
    p.classList.toggle('active', i === idx);
  });

  // Pan map
  map.flyTo([stops[idx].lat, stops[idx].lng], 10, { duration: 0.8 });

  // Scroll tab into view
  const tabs = document.querySelectorAll('.city-tab');
  tabs[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  // Scroll panel to top
  document.getElementById('activitiesPanel').scrollTop = 0;

  activeIdx = idx;
}
